services:
  - type: web
    name: haodacai-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: JWT_ACCESS_TTL_SECONDS
        value: 1800
      - key: JWT_REFRESH_TTL_SECONDS
        value: 604800
